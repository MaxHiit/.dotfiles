## ============================================================================
## Options
## ============================================================================

setw -g mode-keys vi                                            # Use vim Keybindings in copy mode
set -g history-limit 10000                                      # Keep 10000 lines of scrollback history
set -g base-index 1                                             # Start window numbering at 1 instead of 0 
set -g pane-base-index 1                                        # Start pane numbering at 1 instead of 0 
set -g allow-rename on                                          # Allow programs to rename windows automatically
set -g renumber-windows on                                      # Automatically renumber windows when one is closed
set -g default-terminal "${TERM}"                               # Set the default terminal type from your environment
set -g mouse on                                                 # Enable mouse support (Click, scroll, resize panes)
set -g set-titles on                                            # Set terminal window title to match tmux session/window
setw -g monitor-activity on                                     # Highlight windows with activity in the status bar 
set -g bell-action any                                          # Ring bell when any window has a bell
set -g visual-bell off                                          # Don't show visual bell indicators
set -g visual-activity off                                      # Don't show visual indicators for window activity
set -g focus-events on                                          # Send focus events to programs (useful for vim/editor autoreload)
setw -g aggressive-resize on                                    # Resize window to smallest client actively viewving it
set -g detach-on-destroy off                                    # Don't detach session when destroying a window (switch to another session)
set -s escape-time 0                                            # Remove delay when pressing Escape (important for vim)
set -as terminal-features ",*:RGB"                              # Enable RGB (true color) support for all terminals
set-option -ga terminal-overrides ",xterm-256color:Tc"          # Enable true color support specifically for xterm-256color
set-option -g default-terminal "xterm-256color"
set -g repeat-time 1000                                         # Increase "prefix-free" window
set -g display-time 4000                                        # Increase tmux messages display duration from 750ms to 4s
set -g status-interval 5                                        # Refresh 'status-left' and 'status-right' more often, from every 15s to 5s
set-option -g status-position bottom                            # Position the status bar at the bottom of the terminal
set -g default-shell "${SHELL}"                                 # Use the system's default shell automatically
set -g default-command "${SHELL}"                               # Ensure new panes also use the default shell

## ============================================================================
## Key bindings 
## # -r means that the bind can repeat without entering prefix again
## # -n means that the bind doesn't use the prefix
## ============================================================================

# Change prefix
unbind C-b
set -g prefix C-a

# Send prefix to a nested tmux session by doubling the prefix
bind C-a send-prefix

# 'PREFIX r' to relaod of the config file
unbind r
bind r source-file ~/.config/tmux/tmux.conf\; display-message "Config reloaded 🚀"

# Allow holding Ctrl when using prefix=p/n for switching windows
bind C-p previous-window
bind C-n next-window

# Move around panes like vim
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Quickly cycle through windows using Ctrl-h and Ctrl-l
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Switch between select-paneprevious and next windows with repeatable
bind -r n next-window
bind -r p previous-window

# Resize panes more easily
bind H resize-pane -L 5
bind L resize-pane -R 5
bind J resize-pane -D 5
bind K resize-pane -U 5

# Resize panes more easily with Ctrl
bind C-H resize-pane -L 5
bind C-L resize-pane -R 5
bind C-J resize-pane -D 5
bind C-K resize-pane -U 5

# Move the current window to the next window or previous postion
bind -r N run-shell "tmux swap-window -t $(expr $(tmux list-windows | grep \"(active)\" | cut -d \":\" -f 1) + 1)"
bind -r P run-shell "tmux swap-window -t $(expr $(tmux list-windows | grep \"(active)\" | cut -d \":\" -f 1) - 1)"

# Switch between two most recently used windows
bind Space last-window

# Switch between the most recently used sessions
bind b switch-client -l

# Open lazygit in a new window with prefix-g
bind-key g new-window -n lazygit -c "#{pane_current_path}" "lazygit"

# Show a promp to kill a window with prefix-X
bind-key X command-prompt -p "kill window: " "kill-window -t '%%'"

# Use prefix=| to split window vertically and prefix+- 
# to split horizontally also use the current pane path 
# to define the new pane path
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

# Toggle status bar
bind-key -T prefix t set-option -g status

# Search sessions
bind C-e display-popup -E "\
  tmux list-sessions -F '#{?session_attached,,#{session_name}}' |\
  sed '/^$/d' |\
  fzf --reverse --header jump-to-session |\
  xargs tmux switch-client -t"

# Search windows in current session
bind C-f display-popup -E "\
  tmux list-windows -F '#{?window_index,,#{window_name}}' |\
  sed '/^$/d' |\
  fzf ##reverse ##header jump-to-window |\
  xargs tmux select-window -t"

## ============================================================================
## Theme
## ============================================================================

# Customize status bar
set -g status-style bg=default,fg=white
set -g status-left ""
set -g status-right "#[bg=#27272A,fg=#eeeeee]   #(basename #{pane_current_path}) #[bg=#2ECC71,fg=black] #S "

# Theme: status (windows)
set -g window-status-format "| #[fg=#eeeee]○ [#I] #W |"
set -g window-status-current-format "#[fg=#eeeeee]| #[fg=#EF4444]● [#I] #[fg=#2ECC71]#W #[fg=#eeeeee]|"

## ============================================================================
## Plugins
## ============================================================================

set-environment -g TMUX_PLUGIN_MANAGER_PATH ~/.config/tmux/plugins
set -g @plugin 'tmux-plugins/tpm'                                       # Tmux Plugin Manager - mange all your tmux plugins 
set -g @plugin "tmux-plugins/tmux-sensible"                             # Sensible default tmux settings everyone can agree on 
set -g @plugin "tmux-plugins/tmux-resurrect"                            # Save/restore tmux sessions (prefix + Ctrl-s to save, prefix + Ctrl-r to restore)
set -g @plugin "tmux-plugins/tmux-continuum"                            # Automatic continuous saving of tmux session
set -g @plugin "tmux-plugins/tmux-yank"                                 # Copy to system clipboard (work across different platforms)
set -g @plugin "christoomey/vim-tmux-navigator"                         # Seamless naviagation between vim splits and tmux panes (Ctrl-h/j/k/l)
set -g @plugin "tmux-plugins/tmux-prefix-highlight"                     # Shows when prefix key is pressed in status bar
set -g @plugin "sainnhe/tmux-fzf"                                       # Fuzzy finder integration for sessions, windosw, panes
set -g @continuum-restore "on"                                          # Automatically restore kast saved session when tmux starts
set -g @continuum-boot-options 'alacritty'                              # Start alacritty instead of Terminal.app
set -g @resurrect-dir "~/.config/tmux/resurrect"                        # Customize where resurrect save files are stored.
run-shell ~/.config/tmux/plugins/tmux-resurrect/resurrect.tmux          # Manually load ressurect plugin (not needed if using TPM)
run "~/.config/tmux/plugins/tpm/tpm"                                    # Initialize TPM - must be at very bottom of tmux.conf
