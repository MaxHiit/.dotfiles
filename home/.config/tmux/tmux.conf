## ============================================================================
## Options
## ============================================================================

setw -g mode-keys vi                                            # Use vim keybindings in copy mode
set -g history-limit 10000                                      # Keep 10000 lines of scrollback history
set -g base-index 1                                             # Start window numbering at 1
set -g pane-base-index 1                                        # Start pane numbering at 1
set -g allow-rename on                                          # Allow programs to rename windows
set -g renumber-windows on                                      # Renumber windows when one is closed
set -g default-terminal "${TERM}"                               # Set terminal type from environment
set -g mouse on                                                 # Enable mouse support
set -g set-titles on                                            # Set terminal title to tmux session/window
setw -g monitor-activity on                                     # Highlight windows with activity
set -g bell-action any                                          # Ring bell when any window has a bell
set -g visual-bell off                                          # No visual bell indicators
set -g visual-activity off                                      # No visual indicators for activity
set -g focus-events on                                          # Send focus events (useful for vim autoreload)
setw -g aggressive-resize on                                    # Resize to smallest active client
set -g detach-on-destroy off                                    # Switch to another session on destroy
set -s escape-time 0                                            # No delay on Escape (important for vim)
set -as terminal-features ",*:RGB"                              # Enable RGB true color
set-option -ga terminal-overrides ",xterm-256color:Tc"          # True color for xterm-256color
set-option -g default-terminal "xterm-256color"
set -g repeat-time 1000                                         # Increase prefix-free window
set -g display-time 4000                                        # Messages display duration 4s
set -g status-interval 5                                        # Refresh status every 5s
set-option -g status-position bottom                            # Status bar at the bottom
set -g default-shell "${SHELL}"                                 # Use system default shell
set -g default-command "${SHELL}"                               # New panes use default shell

## ============================================================================
## Key bindings
## # -r means the bind can repeat without entering prefix again
## # -n means the bind doesn't use the prefix
## ============================================================================

# Change prefix from C-b to C-a
unbind C-b
set -g prefix C-a

# Send prefix to nested tmux session by doubling the prefix
bind C-a send-prefix

# Reload config with prefix+r
unbind r
bind r source-file ~/.config/tmux/tmux.conf\; display-message "Config reloaded 🚀"

# Allow holding Ctrl when using prefix+p/n for switching windows
bind C-p previous-window
bind C-n next-window

# Move around panes like vim
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Cycle through windows with Ctrl-h and Ctrl-l
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Switch between previous and next windows
bind -r n next-window
bind -r p previous-window

# Resize panes
bind H resize-pane -L 5
bind L resize-pane -R 5
bind J resize-pane -D 5
bind K resize-pane -U 5

# Resize panes with Ctrl
bind C-H resize-pane -L 5
bind C-L resize-pane -R 5
bind C-J resize-pane -D 5
bind C-K resize-pane -U 5

# Move current window to next or previous position
bind -r N run-shell "tmux swap-window -t $(expr $(tmux list-windows | grep \"(active)\" | cut -d \":\" -f 1) + 1)"
bind -r P run-shell "tmux swap-window -t $(expr $(tmux list-windows | grep \"(active)\" | cut -d \":\" -f 1) - 1)"

# Switch between two most recently used windows
bind Space last-window

# Switch between most recently used sessions
bind b switch-client -l

# Open lazygit in a new window with prefix+g
bind-key g new-window -n lazygit -c "#{pane_current_path}" "lazygit"

# Kill a window with prefix+X
bind-key X command-prompt -p "kill window: " "kill-window -t '%%'"

# Split window vertically with prefix+- and horizontally with prefix+|
# New pane inherits current path
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

# Toggle status bar
bind-key -T prefix t set-option -g status

# Search sessions with fzf popup
bind C-e display-popup -E "\
  tmux list-sessions -F '#{?session_attached,,#{session_name}}' |\
  sed '/^$/d' |\
  fzf --reverse --header jump-to-session |\
  xargs tmux switch-client -t"

# Search windows in current session with fzf popup
bind C-f display-popup -E "\
  tmux list-windows -F '#{?window_index,,#{window_name}}' |\
  sed '/^$/d' |\
  fzf --reverse --header jump-to-window |\
  xargs tmux select-window -t"

## ============================================================================
## Theme
## ============================================================================

set -g status-style bg=default,fg=white
set -g status-left ""
set -g status-right "#[bg=#27272A,fg=#eeeeee]   #(basename #{pane_current_path}) #[bg=#2ECC71,fg=black] #S "

# Window status
set -g window-status-format "| #[fg=#eeeee]○ [#I] #W |"
set -g window-status-current-format "#[fg=#eeeeee]| #[fg=#EF4444]● [#I] #[fg=#2ECC71]#W #[fg=#eeeeee]|"

## ============================================================================
## Plugins
## ============================================================================

set-environment -g TMUX_PLUGIN_MANAGER_PATH ~/.config/tmux/plugins

# Auto-install TPM if not present
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

set -g @plugin 'tmux-plugins/tpm'                               # Tmux Plugin Manager
set -g @plugin "tmux-plugins/tmux-sensible"                     # Sensible default settings
set -g @plugin "tmux-plugins/tmux-resurrect"                    # Save/restore sessions (prefix+Ctrl-s / prefix+Ctrl-r)
set -g @plugin "tmux-plugins/tmux-continuum"                    # Automatic continuous session saving
set -g @plugin "tmux-plugins/tmux-yank"                         # Copy to system clipboard
set -g @plugin "christoomey/vim-tmux-navigator"                 # Seamless navigation between vim and tmux
set -g @plugin "tmux-plugins/tmux-prefix-highlight"             # Show prefix key in status bar
set -g @plugin "sainnhe/tmux-fzf"                               # Fzf integration for sessions/windows/panes

# Plugin options
set -g @continuum-restore "on"                                  # Auto-restore last saved session on start
set -g @continuum-boot-options 'ghostty'                        # Start Ghostty on macOS boot
set -g @resurrect-dir "~/.config/tmux/resurrect"                # Where resurrect saves sessions

# Initialize TPM — must be at the very bottom
run "~/.config/tmux/plugins/tpm/tpm" # Initialize TPM - must be at very bottom of tmux.conf
