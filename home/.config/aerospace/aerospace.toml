# AeroSpace configuration
# Inspired by Christopher2K — adapted for MacBook Pro M5 + external monitor
# alt key = Option key on macOS

# ─────────────────────────────────────────────
# General
# ─────────────────────────────────────────────

# Start AeroSpace at login
start-at-login = true

# Accordion layout — windows stack horizontally, active window is largest
# Switch to tiles with alt-slash, back to accordion with alt-comma
after-startup-command = ["layout accordion"]
default-root-container-layout = "accordion"
default-root-container-orientation = "horizontal"
accordion-padding = 30

# Normalize containers for cleaner layout management
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Show apps that macOS has hidden
automatically-unhide-macos-hidden-apps = true

key-mapping.preset = "qwerty"

# Gaps between windows and screen edges
[gaps]
inner.horizontal = 12
inner.vertical = 12
outer.left = 12
outer.right = 12
outer.top = 12
outer.bottom = 12

# ─────────────────────────────────────────────
# Mode: main
# ─────────────────────────────────────────────

[mode.main.binding]

# ── Layout ────────────────────────────────────
alt-slash = "layout tiles horizontal vertical"     # switch to tiles
alt-comma = "layout accordion horizontal vertical" # switch to accordion

# ── Focus () ─────────────────────────
# vim-styles focus
alt-h = "focus left"
alt-j = "focus down"
alt-k = "focus up"
alt-l = "focus right"

# ── Move windows ──────────────────────────────
# vim-styles
alt-shift-h = "move left"
alt-shift-j = "move down"
alt-shift-k = "move up"
alt-shift-l = "move right"

# ── Resize ────────────────────────────────────
alt-shift-minus = "resize smart -50"
alt-shift-equal = "resize smart +50"

# ── Workspaces ────────────────────────────────
alt-1 = "workspace 1"
alt-2 = "workspace 2"
alt-3 = "workspace 3"
alt-4 = "workspace 4"
alt-5 = "workspace 5"
alt-m = "workspace M" # messaging workspace

# ── Move window to workspace ──────────────────
alt-shift-1 = "move-node-to-workspace 1"
alt-shift-2 = "move-node-to-workspace 2"
alt-shift-3 = "move-node-to-workspace 3"
alt-shift-4 = "move-node-to-workspace 4"
alt-shift-5 = "move-node-to-workspace 5"
alt-shift-m = "move-node-to-workspace M"

# ── Workspace navigation ──────────────────────
alt-tab = "workspace-back-and-forth"                           # toggle last workspace
alt-shift-tab = "move-workspace-to-monitor --wrap-around next" # move workspace to other monitor

# ── Monitor focus ─────────────────────────────
alt-leftSquareBracket = "focus-monitor left"
alt-rightSquareBracket = "focus-monitor right"

# ── Service mode ──────────────────────────────
alt-shift-semicolon = "mode service"

# ─────────────────────────────────────────────
# Mode: service (rarely used actions)
# Enter with alt-shift-; — exit with esc
# ─────────────────────────────────────────────

[mode.service.binding]
esc = ["reload-config", "mode main"]

# Flatten nested containers
r = ["flatten-workspace-tree", "mode main"]

# Toggle float/tile
f = ["layout floating tiling", "mode main"]

# Close all windows except current
backspace = ["close-all-windows-but-current", "mode main"]

# Join windows together
alt-shift-h = ["join-with left", "mode main"]
alt-shift-j = ["join-with down", "mode main"]
alt-shift-k = ["join-with up", "mode main"]
alt-shift-l = ["join-with right", "mode main"]

# ─────────────────────────────────────────────
# Monitor assignments
# MacBook screen = main, external monitor = secondary
# ─────────────────────────────────────────────

[workspace-to-monitor-force-assignment]
"1" = "main"
"2" = "main"
"3" = "main"
"4" = "main"
"5" = "main"
"M" = "main"

# ─────────────────────────────────────────────
# App → workspace assignments
# ─────────────────────────────────────────────

[[on-window-detected]]
if.app-id = "com.mitchellh.ghostty"
run = "move-node-to-workspace 1"

[[on-window-detected]]
if.app-id = "net.imput.helium"
run = "move-node-to-workspace 2"

[[on-window-detected]]
if.app-id = "com.figma.Desktop"
run = "move-node-to-workspace 2"

[[on-window-detected]]
if.app-id = "com.hnc.Discord"
run = "move-node-to-workspace M"

[[on-window-detected]]
if.app-id = "com.apple.MobileSMS"
run = "move-node-to-workspace M"

[[on-window-detected]]
if.app-id = "net.whatsapp.WhatsApp"
run = "move-node-to-workspace M"

[[on-window-detected]]
if.app-id = "me.proton.pass.electron"
run = "layout floating"
